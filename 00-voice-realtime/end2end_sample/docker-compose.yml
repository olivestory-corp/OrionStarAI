version: '3.8'

services:
  gemini-live:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-live
    ports:
      - "8081:8081"
    volumes:
      # 挂载 Google 凭证文件
      - ./server/key:/app/server/key:ro
      # 可选：挂载环境变量文件
      # - ./server/.env.production:/app/server/.env.production:ro
    environment:
      - NODE_ENV=production
      - PORT=8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
